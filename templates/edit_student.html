{% extends "base.html" %}

{% block title %}
Edit Student
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-warning">

                <h4 class="mb-0">

                    Edit Student

                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Roll Number

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="roll_no"
                            value="{{ student.roll_no }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Student Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            value="{{ student.name }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            value="{{ student.email }}">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            value="{{ student.phone }}"
                            pattern="[0-9]{10}"
                            maxlength="10"
                            minlength="10"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Course

                        </label>

                        <select
                            class="form-select"
                            name="course">

                            <option value="BCA"
                                {% if student.course == "BCA" %}
                                selected
                                {% endif %}
                            >
                                BCA
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Year

                        </label>

                        <select
                            class="form-select"
                            name="year">

                            <option value="First Year"
                                {% if student.year == "First Year" %}
                                selected
                                {% endif %}
                            >
                                First Year
                            </option>

                            <option value="Second Year"
                                {% if student.year == "Second Year" %}
                                selected
                                {% endif %}
                            >
                                Second Year
                            </option>

                            <option value="Third Year"
                                {% if student.year == "Third Year" %}
                                selected
                                {% endif %}
                            >
                                Third Year
                            </option>

                        </select>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-warning">

                            Update Student

                        </button>

                        <a
                            href="/students"
                            class="btn btn-secondary">

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
