{% extends "base.html" %}

{% block title %}
Edit Attendance
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6 col-md-8">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-warning">

                <h3 class="mb-0 fw-bold">

                    Edit Attendance

                </h3>

            </div>

            <div class="card-body p-4">

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Student Name

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ attendance.student.name }}"
                        readonly
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">

                        Attendance Date

                    </label>

                    <input
                        type="text"
                        class="form-control"
                        value="{{ attendance.attendance_date }}"
                        readonly
                    >

                </div>

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Attendance Status

                        </label>

                        <select
                            name="status"
                            class="form-select"
                        >

                            <option
                                value="Present"
                                {% if attendance.status == "Present" %}
                                selected
                                {% endif %}
                            >
                                Present
                            </option>

                            <option
                                value="Absent"
                                {% if attendance.status == "Absent" %}
                                selected
                                {% endif %}
                            >
                                Absent
                            </option>

                        </select>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-success"
                        >
                            Update Attendance
                        </button>

                        <a
                            href="/attendance-report"
                            class="btn btn-secondary"
                        >
                            Back
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
