<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        Login

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>

        body {

            font-family: 'Poppins', sans-serif;

            background: linear-gradient(
                135deg,
                #0F172A,
                #2563EB
            );

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

        }

        .login-card {

            width: 100%;

            max-width: 450px;

            border: none;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

        }

        .brand-title {

            font-weight: 600;

            color: #0F172A;

        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-body p-5">

        <div class="text-center mb-4">

            <h2 class="brand-title">

                🎓 College Attendance System

            </h2>

            <p class="text-muted">

                Admin & Teacher Login

            </p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
