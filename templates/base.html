<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        {% block title %}
        College Students Attendance System
        {% endblock %}

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <style>

        body {

            font-family: 'Poppins', sans-serif;

            background: #F8FAFC;

        }

        .top-navbar {

            background: #0F172A;

        }

        .sidebar {

            background: #0F172A;

            min-height: 100vh;

        }

        .sidebar a{

            display:flex;

            align-items:center;

            gap:15px;

            color:white;

            text-decoration:none;

            padding:14px 18px;

            border-radius:10px;

            margin:8px;

            transition:.25s;

        }

        .sidebar a i{

            font-size:20px;

            min-width:25px;

            text-align:center;

        }

        .sidebar a:hover{

            background:#2563EB;

            transform:translateX(6px);

        }

        .sidebar a.active{

            background:#2563EB;

            color:#fff;

            font-weight:600;

            box-shadow:0 6px 18px rgba(37,99,235,.35);

        }

        .content-area {

            padding: 25px;

        }

        .logo-text {

            font-weight: 600;

            color: white;
        }

        .user-card{

            text-align:center;

            color:white;

            padding:20px;

            transition:.3s;

        }

        .sidebar.collapsed{

            width:80px;

        }

        .sidebar.collapsed .sidebar-text{

            display:none;

        }

        .sidebar.collapsed .user-details{

            display:none;

        }

        .sidebar.collapsed .user-icon{

            font-size:38px;

        }

        .user-icon {

            font-size: 60px;
        }

        @media (max-width: 768px) {

            .sidebar {

                min-height: auto;

            }

        }

        .quick-card{

            border:none;

            border-radius:16px;

            background:#ffffff;

            transition:all .35s ease;

            cursor:pointer;

            overflow:hidden;

        }

        .quick-card:hover{

            transform:translateY(-8px);

            box-shadow:0 18px 35px rgba(15,23,42,.15);

        }

        .quick-card:hover .quick-icon{

            transform:scale(1.12);

        }

        .quick-card:hover .quick-title{

            color:#2563EB;

        }

        .quick-icon{

            font-size: 55px;
            transition:.35s;

        }

        .quick-title{

            font-weight: 600;

            color: #1E293B;

        }

        .quick-text{

            color: #64748B;

            font-size: 14px;

        }

        .erp-layout{

            display:flex;

        }

        .sidebar{

            width:260px;

            min-height:calc(100vh - 56px);

            background:#0F172A;

            transition:.35s;

            overflow:hidden;

            flex-shrink:0;

        }

        .content-area{

            flex:1;

            padding:25px;

            transition:.35s;

        }

        .stat-card{

            border:none;

            border-radius:18px;

            padding:20px;

            height:100%;

            transition:all .35s ease;

            box-shadow:0 10px 25px rgba(15,23,42,.08);

        }

        .stat-card:hover{

            transform:translateY(-8px);

            box-shadow:0 20px 40px rgba(15,23,42,.15);

        }

        .stat-icon{

            font-size:32px;

            margin-bottom:15px;

        }

        .stat-title{

            font-size:15px;

            font-weight:500;

            color:#475569;

        }

        .stat-number{

            font-size:34px;

            font-weight:700;

            color:#0F172A;

            margin-top:8px;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark top-navbar">

    <div class="container-fluid">

        <div class="d-flex align-items-center">

            <button
                id="toggleSidebar"
                class="btn btn-outline-light me-3">

                <i class="bi bi-list"></i>

            </button>

            <span class="navbar-brand mb-0 h1">

                🎓 College Attendance System

            </span>

        </div>

        <a
            href="{{ url_for('auth.logout') }}"
            class="btn btn-danger">

            Logout

        </a>

    </div>

</nav>

<div class="erp-layout">

        <div
            id="sidebar"
            class="sidebar">

            <div class="user-card">

                <div class="user-icon">

                    <i class="bi bi-person-circle"></i>

                </div>

                <div class="user-details">

                    <h5 class="sidebar-text">

                        {{ current_user.name }}

                    </h5>

                    <small class="sidebar-text">

                        {{ current_user.role }}

                    </small>

                </div>

            </div>

            <hr class="text-white">

            <a
                href="/dashboard"
                title="Dashboard"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                class="{% if request.path == '/dashboard' %}active{% endif %}">

                <i class="bi bi-house-door-fill"></i>

                <span class="sidebar-text">

                    Dashboard

                </span>

            </a>

            
            <a
                href="/students"
                title="Students"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                class="{% if request.path.startswith('/students') %}active{% endif %}">

                <i class="bi bi-people-fill"></i>

                <span class="sidebar-text">

                    Students

                </span>

            </a>

            <a
                href="/attendance"
                title="Attendance"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                class="{% if request.path == '/attendance' %}active{% endif %}">

                <i class="bi bi-calendar-check-fill"></i>

                <span class="sidebar-text">

                    Attendance

                </span>

            </a>

            <a
                href="/attendance-report"
                title="Attendance Report"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                class="{% if request.path == '/attendance-report' %}active{% endif %}"> 

                <i class="bi bi-file-earmark-bar-graph-fill"></i>

                <span class="sidebar-text">

                    Attendance Report

                </span>

            </a>

            <a
                href="/attendance-summary"
                title="Attendance Summary"
                data-bs-toggle="tooltip"
                data-bs-placement="right"
                class="{% if request.path == '/attendance-summary' %}active{% endif %}">

                <i class="bi bi-bar-chart-fill"></i>

                <span class="sidebar-text">

                    Attendance Summary

                </span>

            </a>

        </div>

        <div
            id="content"
            class="content-area">

            {% block content %}
            {% endblock %}

        </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const toggleButton = document.getElementById("toggleSidebar");

    const sidebar = document.getElementById("sidebar");

    toggleButton.addEventListener("click", function () {

        sidebar.classList.toggle("collapsed");

    });

});

</script>

<script>

const tooltipTriggerList = [].slice.call(
    document.querySelectorAll(
        '[data-bs-toggle="tooltip"]'
    )
);

tooltipTriggerList.forEach(function (tooltipTriggerEl) {

    new bootstrap.Tooltip(
        tooltipTriggerEl
    );

});

</script>

{% block scripts %}
{% endblock %}

</body>

</html>
