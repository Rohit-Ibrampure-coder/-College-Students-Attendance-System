<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        {% block title %}
        College Students Attendance System
        {% endblock %}

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <style>

        body {

            font-family: 'Poppins', sans-serif;

            background: #F8FAFC;

        }

        .top-navbar {

            background: #0F172A;

        }

        .sidebar {

            background: #0F172A;

            min-height: 100vh;

        }

        .sidebar a {

            color: white;

            text-decoration: none;

            display: block;

            padding: 12px 15px;

            border-radius: 8px;

            margin-bottom: 8px;

        }

        .sidebar a:hover {

            background: #2563EB;

        }

        .content-area {

            padding: 25px;

        }

        .logo-text {

            font-weight: 600;

            color: white;
        }

        .user-card {

            text-align: center;

            color: white;

            padding: 20px;
        }

        .user-icon {

            font-size: 60px;
        }

        @media (max-width: 768px) {

            .sidebar {

                min-height: auto;

            }

        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark top-navbar">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">

            🎓 College Attendance System

        </span>

        <a
            href="{{ url_for('auth.logout') }}"
            class="btn btn-danger">

            Logout

        </a>

    </div>

</nav>

<div class="container-fluid">

    <div class="row">

        <div class="col-lg-2 col-md-3 sidebar">

            <div class="user-card">

                <div class="user-icon">

                    <i class="bi bi-person-circle"></i>

                </div>

                <h5>

                    {{ current_user.name }}

                </h5>

                <small>

                    {{ current_user.role }}

                </small>

            </div>

            <hr class="text-white">

            <a href="/dashboard">

                <i class="bi bi-house-door-fill"></i>

                Dashboard

            </a>

            <a href="/students">

                <i class="bi bi-people-fill"></i>

                Students

            </a>

            <a href="/attendance">

                <i class="bi bi-calendar-check-fill"></i>

                Attendance

            </a>

            <a href="/attendance-report">

                <i class="bi bi-file-earmark-bar-graph-fill"></i>

                Attendance Report

            </a>

            <a href="/attendance-summary">

                <i class="bi bi-bar-chart-fill"></i>

                Attendance Summary

            </a>

        </div>

        <div class="col-lg-10 col-md-9 content-area">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
