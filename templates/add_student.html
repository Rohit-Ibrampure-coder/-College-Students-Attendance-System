{% extends "base.html" %}

{% block title %}
Add Student
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-sm">

            <div class="card-header bg-primary text-white">

                <h4 class="mb-0">

                    Add New Student

                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Roll Number

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="roll_no"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Student Name

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Phone Number

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="phone"
                            pattern="[0-9]{10}"
                            maxlength="10"
                            minlength="10"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Course

                        </label>

                        <select
                            class="form-select"
                            name="course">

                            <option value="BCA">

                                BCA

                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Year

                        </label>

                        <select
                            class="form-select"
                            name="year">

                            <option value="First Year">

                                First Year

                            </option>

                            <option value="Second Year">

                                Second Year

                            </option>

                            <option value="Third Year">

                                Third Year

                            </option>

                        </select>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-success">

                            Save Student

                        </button>

                        <a
                            href="/students"
                            class="btn btn-secondary">

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
